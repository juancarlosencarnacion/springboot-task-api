name: Maven Package

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout del codigo
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Ejecutar Pruebas Unitarias con Maven
      run: ./mvnw clean test # Corre tus tests de JUnit/Mockito primero

    # - name: Compilar el archivo JAR
    #   run: ./mvnw package -DskipTests # Genera el JAR (saltando los tests porque ya se ejecutaron arriba)

    - name: Iniciar sesión en GitHub Container Registry (GHCR)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extraer Metadatos de Docker (Tags y Labels)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=sha,format=short
          latest

    - name: Construir y Subir Imagen Docker a GitHub Packages
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
    
    - name: Notificar despliegue a Render
      run: |
        curl -X POST "${{ secrets.RENDER_DEPLOY_WEBHOOK_URL }}"
